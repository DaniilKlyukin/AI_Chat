<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primat AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="style.css?v={{ css_ver }}">
    <link rel="icon" href="data:,">
</head>
<body class="bg-[#e3effa] text-slate-900 h-screen flex flex-col font-sans relative">

    <div id="drop-overlay" class="hidden absolute inset-0 z-50 bg-[#e3effa]/90 backdrop-blur-sm flex items-center justify-center border-4 border-dashed border-[#50a2e9] m-4 rounded-3xl">
        <div class="text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto text-[#50a2e9] mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <h2 class="text-2xl font-bold text-slate-800">Отпустите файлы здесь</h2>
            <p class="text-slate-600 mt-2">Текст из файлов будет отправлен ассистенту</p>
        </div>
    </div>

    <header class="h-14 bg-white/95 flex justify-between items-center px-4 shadow-sm z-10 border-b border-[#c8d7e6] backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#50a2e9] rounded-full flex items-center justify-center font-bold text-white shadow-inner">
                P
            </div>
            <div>
                <h1 class="font-bold text-[15px] leading-tight text-slate-800">Primat AI</h1>
                <span class="text-[12px] text-[#50a2e9] block mt-[-2px]">online</span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Tools</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="tools-toggle" class="sr-only peer" checked>
                    <div class="w-8 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#50a2e9]"></div>
                </label>
            </div>
            <button id="clear-btn" class="text-[#50a2e9] hover:text-red-500 transition text-[14px] font-medium px-2">
                Очистить
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden relative chat-background">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-72 space-y-3 scroll-smooth">
            <div class="flex justify-center my-4">
                <span class="bg-[#86a9c9] px-4 py-0.5 rounded-full text-[12px] text-white font-medium shadow-sm">
                    Сегодня
                </span>
            </div>
        </div>

        <div id="loader" class="hidden absolute bottom-28 left-1/2 -translate-x-1/2 bg-white/95 border border-slate-200 px-4 py-2 rounded-full shadow-lg flex items-center gap-3 z-20">
            <div class="flex gap-1">
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            </div>
        </div>

        <div class="bg-white border-t border-[#c8d7e6] z-10 flex flex-col">
            <div id="file-preview-container" class="hidden px-4 md:px-20 lg:px-72 py-2 gap-2 flex-wrap border-b border-gray-100 bg-gray-50/50"></div>

            <div class="p-3">
                <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-2 px-2 relative">
                    <input type="file" id="file-input" multiple class="hidden">

                    <button type="button" id="attach-btn" class="text-slate-400 hover:text-[#50a2e9] transition p-2 mb-0.5 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 transform rotate-45">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
                        </svg>
                    </button>

                    <div class="flex-1 bg-[#f1f4f7] rounded-[20px] px-4 py-2 border border-transparent focus-within:bg-white focus-within:border-[#50a2e9]/50 transition shadow-inner">
                        <textarea
                            id="user-input"
                            rows="1"
                            placeholder="Сообщение или перетащите файлы..."
                            class="w-full bg-transparent focus:outline-none resize-none text-[15px] text-slate-800 py-1"
                        ></textarea>
                    </div>
                    <button
                        type="submit"
                        class="bg-[#50a2e9] hover:bg-[#4392d8] text-white w-[42px] h-[42px] rounded-full transition flex items-center justify-center shadow-md flex-shrink-0"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 rotate-45 -translate-y-0.5 -translate-x-0.5">
                            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js?v={{ js_ver }}"></script>
</body>
</html>

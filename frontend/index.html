<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primat AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="style.css?v={{ css_ver }}">
    <link rel="icon" href="data:,">
</head>
<body class="bg-[#e3effa] text-slate-900 h-screen flex flex-col font-sans">

    <header class="h-14 bg-white/95 flex justify-between items-center px-4 shadow-sm z-10 border-b border-[#c8d7e6] backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#50a2e9] rounded-full flex items-center justify-center font-bold text-white shadow-inner">
                P
            </div>
            <div>
                <h1 class="font-bold text-[15px] leading-tight text-slate-800">Primat AI</h1>
                <span class="text-[12px] text-[#50a2e9] block mt-[-2px]">online</span>
            </div>
        </div>
        <button id="clear-btn" class="text-[#50a2e9] hover:text-red-500 transition text-[14px] font-medium px-2">
            Очистить
        </button>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden relative chat-background">
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-72 space-y-3 scroll-smooth">
            <div class="flex justify-center my-4">
                <span class="bg-[#86a9c9] px-4 py-0.5 rounded-full text-[12px] text-white font-medium shadow-sm">
                    Сегодня
                </span>
            </div>
        </div>

        <div id="loader" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 bg-white/95 border border-slate-200 px-4 py-2 rounded-full shadow-lg flex items-center gap-3 z-20">
            <div class="flex gap-1">
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-1.5 h-1.5 bg-[#50a2e9] rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            </div>
        </div>

        <div class="p-3 bg-white border-t border-[#c8d7e6] z-10">
            <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-2 px-2">
                <div class="flex-1 bg-[#f1f4f7] rounded-[20px] px-4 py-2 border border-transparent focus-within:bg-white focus-within:border-[#50a2e9]/50 transition shadow-inner">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Сообщение"
                        class="w-full bg-transparent focus:outline-none resize-none text-[15px] text-slate-800 py-1"
                    ></textarea>
                </div>
                <button
                    type="submit"
                    class="bg-[#50a2e9] hover:bg-[#4392d8] text-white w-[42px] h-[42px] rounded-full transition flex items-center justify-center shadow-md flex-shrink-0"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 rotate-45 -translate-y-0.5 -translate-x-0.5">
                        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <script src="script.js?v={{ js_ver }}"></script>
</body>
</html>

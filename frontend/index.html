<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col">

    <header class="border-b border-slate-700 p-4 bg-slate-800 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="font-bold text-xl tracking-tight">AI Chat Assistant</h1>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <div class="bg-slate-700 px-3 py-1 rounded text-slate-300">
                <span class="opacity-50">Model:</span> <span id="model-name">...</span>
            </div>
            <button id="clear-btn" class="bg-red-900/30 hover:bg-red-900/50 text-red-400 px-4 py-1 rounded border border-red-900/50 transition">
                Clear Context
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-64 border-r border-slate-700 bg-slate-800/50 p-4 hidden md:block overflow-y-auto">
            <h2 class="text-xs font-semibold text-slate-500 uppercase mb-4">Session Info</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Session ID</label>
                    <div id="session-display" class="font-mono text-xs truncate bg-slate-900 p-2 rounded">...</div>
                </div>
            </div>

            <h2 class="text-xs font-semibold text-slate-500 uppercase mt-8 mb-4">Chat Settings</h2>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <label for="setting-temperature">Temperature</label>
                        <span id="val-temperature">0.3</span>
                    </div>
                    <input type="range" id="setting-temperature" min="0" max="1" step="0.1" value="0.3" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <label for="setting-topp">Top P</label>
                        <span id="val-topp">0.8</span>
                    </div>
                    <input type="range" id="setting-topp" min="0" max="1" step="0.1" value="0.8" class="w-full accent-blue-500">
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col relative bg-slate-900">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth">
                <div class="flex justify-center italic text-slate-500 text-sm mt-10">
                    Напишите сообщение, чтобы начать диалог.
                </div>
            </div>

            <div id="loader" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 px-4 py-2 rounded-full shadow-2xl flex items-center gap-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                </div>
                <span class="text-xs text-slate-300">ИИ печатает...</span>
            </div>

            <div class="p-4 bg-slate-800 border-t border-slate-700">
                <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
                    <textarea
                        id="user-input"
                        rows="1"
                        placeholder="Введите сообщение..."
                        class="flex-1 bg-slate-900 border border-slate-600 rounded-lg p-3 focus:outline-none focus:border-blue-500 resize-none text-slate-100 transition"
                    ></textarea>
                    <button
                        type="submit"
                        class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center gap-2"
                    >
                        <span>Отправить</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
